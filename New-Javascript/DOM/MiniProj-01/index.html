<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">

        <h1 class="heading">Color Changer</h1>
        <div class="inputBtnContainer">
            <button class="randomBtn">Random Color</button>
            <input id="colorInput" type="text" placeholder="Enter a color or hex (e.g. red or #f0)">
            <button class="applyBtn">Apply Color</button>
        </div>
        <p class="currentColor">Current color: <span class="currentColorValue">rgb(223, 171, 112)</span></p>

   </div>
</body>
<script src="script.js"></script>
</html>
